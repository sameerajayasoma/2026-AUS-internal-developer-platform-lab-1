apiVersion: openchoreo.dev/v1alpha1

metadata:
  name: snip-frontend

endpoints:
  - name: webapp
    port: 3000
    type: HTTP
    visibility:
      - external

dependencies:
  endpoints:
    - component: snip-backend
      name: http_api
      visibility: project
      envBindings:
        address: API_SERVICE_URL

configurations:
  env:
    - name: PORT
      value: "3000"